name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Run Lint
        run: ./gradlew :androidApp:lint --no-configuration-cache

      - name: Build Debug APK
        run: ./gradlew :androidApp:assembleDebug --no-configuration-cache

      - name: Run Unit Tests
        run: ./gradlew test --no-configuration-cache
